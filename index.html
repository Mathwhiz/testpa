<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ziv</title>
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1c1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ziv">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eee;
      font-family: system-ui, sans-serif;
      background-color: #1a1c1f;
      background-image:
        radial-gradient(ellipse at 18% 22%, rgba(55,138,221,0.13) 0%, transparent 52%),
        radial-gradient(ellipse at 82% 78%, rgba(127,119,221,0.11) 0%, transparent 52%),
        radial-gradient(ellipse at 60% 10%, rgba(29,158,117,0.07) 0%, transparent 40%);
    }

    .view {
      width: 100%;
      display: flex;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      padding: 2rem 1rem;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    /* ── Lista de congregaciones ── */
    #congre-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .congre-card {
      width: 100%;
      background: #232628;
      border: 1px solid #2e3033;
      border-radius: 18px;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.18s, background 0.18s, transform 0.1s, box-shadow 0.18s;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      outline: none;
      font-family: inherit;
    }
    .congre-card:hover {
      border-color: var(--c-border-hover, #3a3a3a);
      background: var(--c-bg-hover, #272a2d);
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(0,0,0,0.4), 0 0 0 1px var(--c-border-hover, #3a3a3a), 0 4px 20px var(--c-glow, transparent);
    }
    .congre-card:active { transform: scale(0.98); box-shadow: none; }

    .congre-icon {
      width: 46px; height: 46px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 16px; font-weight: 700; letter-spacing: -0.5px;
    }

    .congre-info { flex: 1; min-width: 0; }
    .congre-nombre { font-size: 22px; font-weight: 600; color: #e8e8e8; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .congre-id { font-size: 13px; color: #666; }
    .congre-arrow { color: #444; font-size: 1.3rem; flex-shrink: 0; }

    .loading { color: #555; font-size: 0.9rem; text-align: center; padding: 40px 0; }
    .error   { color: #e07070; font-size: 0.85rem; text-align: center; padding: 20px 0; }

    /* ── Menú de módulos ── */
    .menu-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      padding: 2rem 1rem;
    }

    /* ── Título de congregación ── */
    .menu-congre { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }

    .menu-congre-wrapper {
      position: relative;
      width: 100%;
      border-radius: 20px;
      padding: 3px;
      overflow: hidden;
      --neon-color: #7F77DD;
      --neon-color-dim: rgba(127,119,221,0.3);
    }
    .menu-congre-wrapper::before {
      content: '';
      position: absolute;
      aspect-ratio: 1;
      width: 220%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        transparent 50%,
        rgba(255,255,255,0.15) 60%,
        var(--neon-color) 68%,
        white 73%,
        var(--neon-color) 78%,
        var(--neon-color-dim) 87%,
        transparent 100%
      );
      animation: menu-border-spin 2.8s linear infinite;
      z-index: 0;
    }
    @keyframes menu-border-spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .menu-congre-inner {
      position: relative;
      background: #232628;
      border-radius: 18px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 1;
    }
    .menu-congre-icon {
      width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800;
    }
    #menu-titulo {
      font-size: 22px;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: -0.4px;
    }

    /* ── Botón admin ── */
    .btn-admin {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: #1e1e2e;
      border: 1px solid rgba(127,119,221,0.35);
      border-radius: 12px;
      color: #7F77DD;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s, color .15s, opacity .2s;
    }
    .btn-admin:hover { background: #252535; border-color: rgba(127,119,221,0.6); color: #a09af0; }
    .btn-admin.hidden { opacity: 0; pointer-events: none; }

    /* ── Botón instalar PWA ── */
    .btn-instalar {
      position: fixed;
      bottom: 20px;
      right: 72px;
      width: 44px;
      height: 44px;
      background: #1a1f1e;
      border: 1px solid rgba(29,158,117,0.35);
      border-radius: 12px;
      color: #1D9E75;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn-instalar:hover { background: #1c2420; border-color: rgba(29,158,117,0.6); color: #25c491; }
    .btn-instalar.oculto { display: none; }
    body.en-menu .btn-instalar { display: none !important; }

  </style>
</head>
<body>

  <!-- ── VISTA: ELEGIR CONGREGACIÓN ── -->
  <div id="view-congres" class="view">
    <div class="wrap">
      <div class="logo">
        <div class="cs-logo-placeholder"></div>
        <div class="cs-logo-title">Ziv</div>
        <div class="cs-logo-sub">Seleccioná tu congregación</div>
      </div>
      <div id="congre-list">
        <div class="loading">Cargando congregaciones…</div>
      </div>
      <div class="cs-footer">Ziv · Sistema interno</div>
    </div>
  </div>

  <!-- ── VISTA: ELEGIR MÓDULO ── -->
  <div id="view-menu" class="view" style="display:none">
    <div class="menu-wrap">
      <div class="logo">
        <div class="menu-congre">
          <div class="menu-congre-wrapper" id="menu-congre-wrapper">
            <div class="menu-congre-inner">
              <div class="menu-congre-icon" id="menu-congre-icon"></div>
              <div id="menu-titulo">—</div>
            </div>
          </div>
        </div>
        <div class="cs-logo-sub">Seleccioná un módulo</div>
      </div>

      <a class="cs-nav-card cs-nav-card-terr" href="territorios/index.html">
        <div class="cs-nav-icon cs-nav-icon-terr">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 9m0 8V9m0 0L9 7"
              stroke="#5DB85D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-nav-title">Territorios</div>
          <div class="cs-nav-sub">Planificar y registrar salidas</div>
        </div>
      </a>

      <a class="cs-nav-card cs-nav-card-asign" href="asignaciones/index.html">
        <div class="cs-nav-icon cs-nav-icon-asign">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"
              stroke="#5B8DDE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-nav-title">Asignaciones</div>
          <div class="cs-nav-sub">Acomodadores, sonido y más</div>
        </div>
      </a>

      <a class="cs-nav-card cs-nav-card-herm" href="hermanos/index.html">
        <div class="cs-nav-icon cs-nav-icon-herm">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="#D85A30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="7" r="4" stroke="#D85A30" stroke-width="1.8"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="#D85A30" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-nav-title">Hermanos</div>
          <div class="cs-nav-sub">Roles de asignaciones y VM</div>
        </div>
      </a>

      <a class="cs-nav-card cs-nav-card-vm" href="vida-ministerio/index.html">
        <div class="cs-nav-icon cs-nav-icon-vm">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-nav-title">Vida y Ministerio</div>
          <div class="cs-nav-sub">Programa de la reunión semanal</div>
        </div>
      </a>

      <div class="cs-footer" id="menu-footer"></div>
      <a class="cs-back-btn" href="#" onclick="volverACongres();return false;">← Congregaciones</a>
    </div>
  </div>

  <!-- ── Botón Instalar PWA (fijo, solo Android Chrome) ── -->
  <button class="btn-instalar" id="btn-instalar" title="Instalar app" onclick="instalarApp()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M12 3v13M7 11l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 21h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- ── Botón Admin (fijo) ── -->
  <a href="admin.html" class="btn-admin" title="Admin">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </a>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

    // Ocultar el botón si ya está instalada (modo standalone)
    if (window.matchMedia('(display-mode: standalone)').matches) {
      document.getElementById('btn-instalar').classList.add('oculto');
    }

    let _installPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      _installPrompt = e;
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('btn-instalar').classList.add('oculto');
      _installPrompt = null;
    });

    function instalarApp() {
      if (_installPrompt) {
        // Android Chrome: prompt nativo
        _installPrompt.prompt();
        _installPrompt.userChoice.then(() => { _installPrompt = null; });
      } else {
        // iOS o cuando Chrome no ofrece el prompt: mostrar instrucciones
        const esIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        const msg = esIOS
          ? 'Para instalar la app en iOS:\n\n1. Tocá el botón compartir (⬆) en la barra del navegador\n2. Seleccioná "Agregar a inicio"'
          : 'Para instalar la app:\n\nTocá el menú (⋮) del navegador → "Instalar app" o "Agregar a pantalla de inicio"';
        uiAlert(msg, 'Instalar Ziv');
      }
    }
  </script>
  <script src="ui-utils.js?v=1.3"></script>
  <script type="module">
    import { db } from './firebase.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const PALETA = [
      { bg: 'rgba(55,138,221,0.18)',  border: 'rgba(55,138,221,0.35)',  color: '#378ADD' },
      { bg: 'rgba(151,196,89,0.18)',  border: 'rgba(151,196,89,0.35)',  color: '#97C459' },
      { bg: 'rgba(127,119,221,0.18)', border: 'rgba(127,119,221,0.35)', color: '#7F77DD' },
      { bg: 'rgba(239,159,39,0.18)',  border: 'rgba(239,159,39,0.35)',  color: '#EF9F27' },
      { bg: 'rgba(29,158,117,0.18)',  border: 'rgba(29,158,117,0.35)',  color: '#1D9E75' },
      { bg: 'rgba(216,90,48,0.18)',   border: 'rgba(216,90,48,0.35)',   color: '#D85A30' },
    ];

    function iniciales(nombre) {
      return nombre.trim().split(/\s+/).slice(0,2).map(w => w.charAt(0).toUpperCase()).join('');
    }

    function hexToRgba(hex, a) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function colorPara(id) {
      let h = 0;
      for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xffff;
      return PALETA[h % PALETA.length];
    }

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => { v.style.display = 'none'; });
      const el = document.getElementById(id);
      el.style.animation = 'none';
      el.style.display = 'flex';
      el.offsetHeight;
      el.style.animation = '';
    }

    const btnAdmin   = document.querySelector('.btn-admin');
    const titulo     = document.getElementById('menu-titulo');
    const congreIcon = document.getElementById('menu-congre-icon');
    const congreWrap = document.getElementById('menu-congre-wrapper');

    function mostrarMenu(nombre, color) {
      const col = color || '#7F77DD';
      congreWrap.style.setProperty('--neon-color', col);
      congreWrap.style.setProperty('--neon-color-dim', hexToRgba(col, 0.3));
      congreWrap.style.boxShadow = `0 0 40px ${hexToRgba(col, 0.35)}, 0 0 16px ${hexToRgba(col, 0.5)}, 0 0 6px ${hexToRgba(col, 0.6)}`;
      congreIcon.textContent      = iniciales(nombre);
      congreIcon.style.background = hexToRgba(col, 0.18);
      congreIcon.style.border     = `1px solid ${hexToRgba(col, 0.3)}`;
      congreIcon.style.color      = col;
      titulo.textContent = nombre;
      document.getElementById('menu-footer').textContent = nombre + ' · App interna';
      btnAdmin.classList.add('hidden');
      document.body.classList.add('en-menu');
      showView('view-menu');
    }

    window.volverACongres = function() {
      sessionStorage.removeItem('congreId');
      sessionStorage.removeItem('congreNombre');
      sessionStorage.removeItem('congreColor');
      btnAdmin.classList.remove('hidden');
      document.body.classList.remove('en-menu');
      showView('view-congres');
    };

    async function cargarCongres() {
      const list = document.getElementById('congre-list');
      try {
        const snap = await getDocs(collection(db, 'congregaciones'));
        if (snap.empty) {
          list.innerHTML = '<div class="error">No hay congregaciones registradas.</div>';
          return;
        }
        list.innerHTML = '';
        snap.forEach(doc => {
          const data    = doc.data();
          const id      = doc.id;
          const nombre  = data.nombre || id;
          const inicial = iniciales(nombre);
          const c       = data.color
            ? { color: data.color, bg: hexToRgba(data.color, 0.18), border: hexToRgba(data.color, 0.35) }
            : colorPara(id);

          const card = document.createElement('button');
          card.className = 'congre-card';
          card.style.setProperty('--c-border-hover', hexToRgba(c.color, 0.55));
          card.style.setProperty('--c-bg-hover',     hexToRgba(c.color, 0.09));
          card.style.setProperty('--c-glow',         hexToRgba(c.color, 0.18));
          card.innerHTML = `
            <div class="congre-icon" style="background:${c.bg};border:1px solid ${c.border};color:${c.color};">${inicial}</div>
            <div class="congre-info">
              <div class="congre-nombre">${nombre}</div>
              <div class="congre-id">${id}</div>
            </div>
            <div class="congre-arrow">›</div>
          `;
          card.addEventListener('click', () => {
            sessionStorage.setItem('congreId',     id);
            sessionStorage.setItem('congreNombre', nombre);
            sessionStorage.setItem('congreColor',  c.color);
            mostrarMenu(nombre, c.color);
          });
          list.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        list.innerHTML = `<div class="error">Error al cargar: ${err.message}</div>`;
      }
    }

    // Si ya hay sesión activa → ir directo al menú
    const savedId     = sessionStorage.getItem('congreId');
    const savedNombre = sessionStorage.getItem('congreNombre');
    const savedColor  = sessionStorage.getItem('congreColor');
    if (savedId && savedNombre) {
      mostrarMenu(savedNombre, savedColor);
    }

    cargarCongres();
  </script>

</body>
</html>
