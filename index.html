<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Territory App</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eee;
      font-family: system-ui, sans-serif;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      padding: 2rem 1rem;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    #congre-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .congre-card {
      width: 100%;
      background: #232628;
      border: 1px solid #2e3033;
      border-radius: 18px;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.18s, background 0.18s, transform 0.1s, box-shadow 0.18s;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      outline: none;
      font-family: inherit;
    }
    .congre-card:hover {
      border-color: #3a3a3a;
      background: #272a2d;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .congre-card:active { transform: scale(0.98); box-shadow: none; }

    .congre-icon {
      width: 46px; height: 46px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      background: #1a2030;
      font-size: 1.4rem;
    }

    .congre-info { flex: 1; }
    .congre-nombre { font-size: 17px; font-weight: 600; color: #e8e8e8; margin-bottom: 2px; }
    .congre-id { font-size: 13px; color: #666; }
    .congre-arrow { color: #444; font-size: 1.3rem; }

    .loading { color: #555; font-size: 0.9rem; text-align: center; padding: 40px 0; }
    .error { color: #e07070; font-size: 0.85rem; text-align: center; padding: 20px 0; }

    .btn-admin {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #232628;
      border: 1px solid #2e3033;
      border-radius: 10px;
      padding: 8px 14px;
      color: #555;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: color .15s, border-color .15s;
      font-family: inherit;
    }
    .btn-admin:hover { color: #888; border-color: #444; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="logo">
      <div class="cs-logo-placeholder"></div>
      <div class="cs-logo-title">Territory App</div>
      <div class="cs-logo-sub">Seleccioná tu congregación</div>
    </div>

    <div id="congre-list">
      <div class="loading">Cargando congregaciones…</div>
    </div>

    <div class="cs-footer">Territory App · Sistema interno</div>
  </div>

  <a href="admin.html" class="btn-admin">Admin</a>

  <script src="ui-utils.js"></script>
  <script type="module">
    import { db } from './firebase.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const list = document.getElementById('congre-list');

    const ICONOS = {
      sur:   '🏠',
      norte: '🏡',
      este:  '🏘️',
      oeste: '🏗️',
    };

    async function cargarCongres() {
      try {
        const snap = await getDocs(collection(db, 'congregaciones'));

        if (snap.empty) {
          list.innerHTML = '<div class="error">No hay congregaciones registradas.</div>';
          return;
        }

        list.innerHTML = '';

        snap.forEach(doc => {
          const data   = doc.data();
          const id     = doc.id;
          const nombre = data.nombre || id;
          const icono  = ICONOS[id] || '⛪';

          const card = document.createElement('button');
          card.className = 'congre-card';
          card.innerHTML = `
            <div class="congre-icon">${icono}</div>
            <div class="congre-info">
              <div class="congre-nombre">${nombre}</div>
              <div class="congre-id">${id}</div>
            </div>
            <div class="congre-arrow">›</div>
          `;

          card.addEventListener('click', () => elegirCongre(id, nombre));
          list.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        list.innerHTML = `<div class="error">Error al cargar: ${err.message}</div>`;
      }
    }

    function elegirCongre(id, nombre) {
      sessionStorage.setItem('congreId',     id);
      sessionStorage.setItem('congreNombre', nombre);
      window.location.href = './menu.html';
    }

    cargarCongres();
  </script>

</body>
</html>
