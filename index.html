<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppJW</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eee;
      font-family: system-ui, sans-serif;
      background-color: #1a1c1f;
      background-image:
        radial-gradient(ellipse at 18% 22%, rgba(55,138,221,0.13) 0%, transparent 52%),
        radial-gradient(ellipse at 82% 78%, rgba(127,119,221,0.11) 0%, transparent 52%),
        radial-gradient(ellipse at 60% 10%, rgba(29,158,117,0.07) 0%, transparent 40%);
    }

    .view {
      width: 100%;
      display: flex;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      padding: 2rem 1rem;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    /* ── Lista de congregaciones ── */
    #congre-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .congre-card {
      width: 100%;
      background: #232628;
      border: 1px solid #2e3033;
      border-radius: 18px;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.18s, background 0.18s, transform 0.1s, box-shadow 0.18s;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      outline: none;
      font-family: inherit;
    }
    .congre-card:hover {
      border-color: var(--c-border-hover, #3a3a3a);
      background: var(--c-bg-hover, #272a2d);
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(0,0,0,0.4), 0 0 0 1px var(--c-border-hover, #3a3a3a), 0 4px 20px var(--c-glow, transparent);
    }
    .congre-card:active { transform: scale(0.98); box-shadow: none; }

    .congre-icon {
      width: 46px; height: 46px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 16px; font-weight: 700; letter-spacing: -0.5px;
    }

    .congre-info { flex: 1; min-width: 0; }
    .congre-nombre { font-size: 22px; font-weight: 600; color: #e8e8e8; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .congre-id { font-size: 13px; color: #666; }
    .congre-arrow { color: #444; font-size: 1.3rem; flex-shrink: 0; }

    .loading { color: #555; font-size: 0.9rem; text-align: center; padding: 40px 0; }
    .error   { color: #e07070; font-size: 0.85rem; text-align: center; padding: 20px 0; }

    /* ── Menú de módulos ── */
    .menu-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      padding: 2rem 1rem;
    }

    /* ── Título de congregación ── */
    #menu-titulo {
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-image: linear-gradient(135deg, #f0f0f0 0%, #a0b8f0 100%);
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      text-align: center;
    }

    /* ── Botón admin ── */
    .btn-admin {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: #1e1e2e;
      border: 1px solid rgba(127,119,221,0.35);
      border-radius: 12px;
      color: #7F77DD;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s, color .15s, opacity .2s;
    }
    .btn-admin:hover { background: #252535; border-color: rgba(127,119,221,0.6); color: #a09af0; }
    .btn-admin.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <!-- ── VISTA: ELEGIR CONGREGACIÓN ── -->
  <div id="view-congres" class="view">
    <div class="wrap">
      <div class="logo">
        <div class="cs-logo-placeholder"></div>
        <div class="cs-logo-title">AppJW</div>
        <div class="cs-logo-sub">Seleccioná tu congregación</div>
      </div>
      <div id="congre-list">
        <div class="loading">Cargando congregaciones…</div>
      </div>
      <div class="cs-footer">AppJW · Sistema interno</div>
    </div>
  </div>

  <!-- ── VISTA: ELEGIR MÓDULO ── -->
  <div id="view-menu" class="view" style="display:none">
    <div class="menu-wrap">
      <div class="logo">
        <div id="menu-titulo">—</div>
        <div class="cs-logo-sub">Seleccioná un módulo</div>
      </div>

      <a class="cs-nav-card cs-nav-card-terr" href="territorios/index.html">
        <div class="cs-nav-icon cs-nav-icon-terr">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 9m0 8V9m0 0L9 7"
              stroke="#5DB85D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-nav-title">Territorios</div>
          <div class="cs-nav-sub">Planificar y registrar salidas</div>
        </div>
      </a>

      <a class="cs-nav-card cs-nav-card-asign" href="asignaciones/index.html">
        <div class="cs-nav-icon cs-nav-icon-asign">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"
              stroke="#5B8DDE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="cs-nav-title">Asignaciones</div>
          <div class="cs-nav-sub">Acomodadores, sonido y más</div>
        </div>
      </a>

      <div class="cs-footer" id="menu-footer"></div>
      <a class="cs-back-btn" href="#" onclick="volverACongres();return false;">‹ Congregaciones</a>
    </div>
  </div>

  <!-- ── Botón Admin (fijo) ── -->
  <a href="admin.html" class="btn-admin" title="Admin">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </a>

  <script src="ui-utils.js"></script>
  <script type="module">
    import { db } from './firebase.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const PALETA = [
      { bg: 'rgba(55,138,221,0.18)',  border: 'rgba(55,138,221,0.35)',  color: '#378ADD' },
      { bg: 'rgba(151,196,89,0.18)',  border: 'rgba(151,196,89,0.35)',  color: '#97C459' },
      { bg: 'rgba(127,119,221,0.18)', border: 'rgba(127,119,221,0.35)', color: '#7F77DD' },
      { bg: 'rgba(239,159,39,0.18)',  border: 'rgba(239,159,39,0.35)',  color: '#EF9F27' },
      { bg: 'rgba(29,158,117,0.18)',  border: 'rgba(29,158,117,0.35)',  color: '#1D9E75' },
      { bg: 'rgba(216,90,48,0.18)',   border: 'rgba(216,90,48,0.35)',   color: '#D85A30' },
    ];

    function iniciales(nombre) {
      return nombre.trim().split(/\s+/).slice(0,2).map(w => w.charAt(0).toUpperCase()).join('');
    }

    function hexToRgba(hex, a) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function colorPara(id) {
      let h = 0;
      for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xffff;
      return PALETA[h % PALETA.length];
    }

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => { v.style.display = 'none'; });
      const el = document.getElementById(id);
      el.style.animation = 'none';
      el.style.display = 'flex';
      el.offsetHeight;
      el.style.animation = '';
    }

    const btnAdmin = document.querySelector('.btn-admin');
    const titulo   = document.getElementById('menu-titulo');

    function mostrarMenu(nombre, color) {
      titulo.textContent = nombre;
      const col = color || '#a0b8f0';
      titulo.style.backgroundImage = `linear-gradient(160deg, #ffffff 0%, ${col} 75%)`;
      document.getElementById('menu-footer').textContent = nombre + ' · App interna';
      btnAdmin.classList.add('hidden');
      showView('view-menu');
    }

    window.volverACongres = function() {
      sessionStorage.removeItem('congreId');
      sessionStorage.removeItem('congreNombre');
      sessionStorage.removeItem('congreColor');
      btnAdmin.classList.remove('hidden');
      showView('view-congres');
    };

    async function cargarCongres() {
      const list = document.getElementById('congre-list');
      try {
        const snap = await getDocs(collection(db, 'congregaciones'));
        if (snap.empty) {
          list.innerHTML = '<div class="error">No hay congregaciones registradas.</div>';
          return;
        }
        list.innerHTML = '';
        snap.forEach(doc => {
          const data    = doc.data();
          const id      = doc.id;
          const nombre  = data.nombre || id;
          const inicial = iniciales(nombre);
          const c       = data.color
            ? { color: data.color, bg: hexToRgba(data.color, 0.18), border: hexToRgba(data.color, 0.35) }
            : colorPara(id);

          const card = document.createElement('button');
          card.className = 'congre-card';
          card.style.setProperty('--c-border-hover', hexToRgba(c.color, 0.55));
          card.style.setProperty('--c-bg-hover',     hexToRgba(c.color, 0.09));
          card.style.setProperty('--c-glow',         hexToRgba(c.color, 0.18));
          card.innerHTML = `
            <div class="congre-icon" style="background:${c.bg};border:1px solid ${c.border};color:${c.color};">${inicial}</div>
            <div class="congre-info">
              <div class="congre-nombre">${nombre}</div>
              <div class="congre-id">${id}</div>
            </div>
            <div class="congre-arrow">›</div>
          `;
          card.addEventListener('click', () => {
            sessionStorage.setItem('congreId',     id);
            sessionStorage.setItem('congreNombre', nombre);
            sessionStorage.setItem('congreColor',  c.color);
            mostrarMenu(nombre, c.color);
          });
          list.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        list.innerHTML = `<div class="error">Error al cargar: ${err.message}</div>`;
      }
    }

    // Si ya hay sesión activa → ir directo al menú
    const savedId     = sessionStorage.getItem('congreId');
    const savedNombre = sessionStorage.getItem('congreNombre');
    const savedColor  = sessionStorage.getItem('congreColor');
    if (savedId && savedNombre) {
      mostrarMenu(savedNombre, savedColor);
    }

    cargarCongres();
  </script>

</body>
</html>
