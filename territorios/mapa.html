<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mapa de Territorios</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1e1e1e; color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.map-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #2a2a2a; border-bottom: 0.5px solid #444; flex-shrink: 0; }
.map-back-btn { width: 36px; height: 36px; border-radius: 10px; border: 0.5px solid #555; background: #1e1e1e; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.map-back-btn:hover { background: #333; color: #eee; }
.map-title { font-size: 16px; font-weight: 500; color: #eee; }
.map-subtitle { font-size: 11px; color: #888; }

.map-filters { display: flex; gap: 6px; padding: 8px 14px; background: #242424; border-bottom: 0.5px solid #444; flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-btn { padding: 5px 12px; font-size: 12px; font-weight: 500; border-radius: 20px; border: 1.5px solid; background: transparent; cursor: pointer; white-space: nowrap; transition: opacity 0.15s, background 0.15s; flex-shrink: 0; }
.filter-btn.active { opacity: 1; }
.filter-btn.inactive { opacity: 0.3; }

/* ── Picker bar ── */
.picker-bar {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: #1a2e0a;
  border-bottom: 1.5px solid #3B6D11;
  flex-shrink: 0;
  gap: 10px;
}
.picker-bar.visible { display: flex; }
.picker-bar-info { font-size: 13px; color: #C0DD97; flex: 1; }
.picker-bar-info strong { color: #97C459; }
.picker-done-btn {
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  background: #3B6D11;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.picker-done-btn:hover { background: #27500A; }
.picker-clear-btn {
  padding: 8px 12px;
  font-size: 13px;
  background: transparent;
  color: #F09595;
  border: 0.5px solid #A32D2D;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
}
.picker-clear-btn:hover { background: #2e1a1a; }

#map-wrap { flex: 1; position: relative; min-height: 0; }
#map { position: absolute; inset: 0; }
.leaflet-container { background: #1a1a1a; }
.leaflet-tile { filter: brightness(0.82) saturate(0.75); }

.leaflet-popup-content-wrapper { background: #2a2a2a !important; border: 0.5px solid #555 !important; border-radius: 14px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; color: #eee !important; padding: 0 !important; }
.leaflet-popup-content { margin: 0 !important; padding: 14px 16px !important; }
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button { color: #888 !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }
.leaflet-popup-close-button:hover { color: #eee !important; }

.terr-popup-num { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
.terr-popup-group { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.7; }
.terr-popup-row { display: flex; justify-content: space-between; gap: 16px; font-size: 12px; padding: 5px 0; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
.terr-popup-row:last-child { border-bottom: none; }
.terr-popup-label { color: rgba(255,255,255,0.45); }
.terr-popup-val { font-weight: 500; }
.badge-progreso { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 8px; background: #2e1e00; border: 0.5px solid #EF9F27; color: #FAC775; }

/* Botón agregar en popup (modo picker) */
.popup-add-btn {
  width: 100%;
  margin-top: 12px;
  padding: 9px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.popup-add-btn.add { background: #3B6D11; color: #C0DD97; }
.popup-add-btn.add:hover { background: #27500A; }
.popup-add-btn.remove { background: #2e1a1a; color: #F09595; border: 0.5px solid #A32D2D; }
.popup-add-btn.remove:hover { background: #3a2020; }
.popup-add-btn:active { transform: scale(0.97); }

/* Toast */
.map-toast {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #2a2a2a;
  border: 1.5px solid #3B6D11;
  color: #C0DD97;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 30px;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.map-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.map-toast.remove-toast { border-color: #A32D2D; color: #F09595; }

.map-legend { position: absolute; bottom: 20px; right: 10px; background: rgba(26,26,26,0.94); border: 0.5px solid #444; border-radius: 12px; padding: 10px 12px; z-index: 999; font-size: 11px; backdrop-filter: blur(8px); }
.legend-row { display: flex; align-items: center; gap: 7px; padding: 3px 0; color: #aaa; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
</style>
</head>

  </button>
  <div>

  <button class="filter-btn active" id="filter-C"     style="border-color:#7F77DD;color:#7F77DD;" onclick="filterGroup('C')">Congregación</button>

<div id="map-wrap">

let map;
let allLayers = [];
let territoriosInfo = {};
let activeFilter = 'all';

// ── Estado picker ──
let pickerSelected = new Set(); // números de territorio seleccionados

// ── Leer parámetros URL ──
const _params     = new URLSearchParams(window.location.search);
const _grupoParam = _params.get('grupo') || 'all';
const _modoParam  = _params.get('modo')  || 'full';
const _enProgreso = (_params.get('enprogreso') || '').split(',').filter(Boolean);
const _salidaId   = _params.get('salidaid') || null; // ID de la salida en el planificador

// ── Init ──
function initMap() {
  // Ocultar header y filtros si viene embebido (no full y no picker)
  if (_modoParam !== 'full' && _modoParam !== 'picker') {
    document.querySelector('.map-header').style.display = 'none';
    document.querySelector('.map-filters').style.display = 'none';
  }

  // Modo picker: mostrar barra y ocultar filtros de grupo
  if (_modoParam === 'picker') {
    document.getElementById('picker-bar').classList.add('visible');
    document.querySelector('.map-filters').style.display = 'none';
    document.querySelector('.map-header').style.display = 'none';
    updatePickerBar();
  }

  map = L.map('map', {
    center: [-36.640, -64.295],
    zoom: 14,
    zoomControl: true,
    attributionControl: false,
    maxBounds: L.latLngBounds([-36.675, -64.36], [-36.61, -64.24]),
    maxBoundsViscosity: 1.0,
    minZoom: 13,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  setTimeout(() => { map.invalidateSize(); }, 100);

  loadTerritoriosInfo().then(() => {
    renderTerritories();
    if (_modoParam === 'picker') {
      // Auto-filtrar al grupo, centrar en él
      applyPickerFilter(_grupoParam);
    } else if (_grupoParam !== 'all') {
      filterGroup(_grupoParam);
    } else if (allLayers.length) {
      const bounds = L.latLngBounds(allLayers.map(l => l.polygon.getBounds()));
      map.fitBounds(bounds, { padding: [20, 20] });
    }
    L.marker(SALON_DEL_REINO, {
      icon: L.divIcon({
        className: '',
        html: `<div title="Salón del Reino" style="font-size:20px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.8));">🏠</div>`,
        iconSize: [24, 24], iconAnchor: [12, 20],
      })
    }).bindPopup('<div style="color:#eee;font-weight:600;font-size:13px;">Salón del Reino</div>', {maxWidth:160}).addTo(map);
  });
}

function parseSheetDate(ds) {
  if (!ds) return null;
  const m = ds.match(/(\d{2})\/(\d{2})\/(\d{2,4})/);
  if (m) {
    const y = m[3].length === 2 ? '20' + m[3] : m[3];
    return `${y}-${m[2]}-${m[1]}`;
  }
  return ds;
}

function baseNum(num) {
  return String(num).replace(/[A-Ca-c]$/i, '');
}

async function loadTerritoriosInfo() {
  try {
    const grupos = ['1','2','3','4','C'];
    const results = await Promise.all(grupos.map(g =>
      fetch(SCRIPT_URL + '?action=getLastDates&grupo=' + g)
        .then(r => r.text()).then(t => JSON.parse(t))
        .catch(() => ({}))
    ));
    results.forEach(data => {
      Object.keys(data).forEach(terr => {
        const d = data[terr];
        if (!territoriosInfo[terr] || d.lastFin) {
          territoriosInfo[terr] = {
            lastFin:    parseSheetDate(d.lastFin),
            lastIni:    parseSheetDate(d.lastIni),
            enProgreso: d.enProgreso
          };
        }
      });
    });
  } catch(e) {}
}

function makeLabel(coords, fill, text) {
  let labelCenter;
  { const cc=coords, n2=cc.length; let A=0,cLat=0,cLon=0;
    for(let i=0;i<n2;i++){const[la0,lo0]=cc[i],[la1,lo1]=cc[(i+1)%n2];const cr=lo0*la1-lo1*la0;A+=cr;cLat+=(la0+la1)*cr;cLon+=(lo0+lo1)*cr;}
    A*=0.5;
    const poly = L.polygon(coords);
    labelCenter = Math.abs(A)>1e-10 ? L.latLng(cLat/(6*A),cLon/(6*A)) : poly.getBounds().getCenter();
  }
  const w = Math.max(26, text.length*7+10);
  return L.marker(labelCenter, {
    interactive: false,
    icon: L.divIcon({
      className: '',
      html: `<div style="background:rgba(18,18,18,0.9);border:1.5px solid ${fill};color:${fill};border-radius:6px;padding:2px 5px;font-size:10px;font-weight:700;font-family:system-ui,sans-serif;white-space:nowrap;pointer-events:none;text-align:center;">${text}</div>`,
      iconSize: [w,18], iconAnchor: [w/2,9],
    })
  });
}

// ── Renderizar territorios ──
function renderTerritories() {
  TERRITORIOS.forEach(t => {

    if (_modoParam === 'registrar') {
      if (!_enProgreso.includes(baseNum(t.num))) return;
      const fill = '#EF9F27', border = '#A86800';
      const polygon = L.polygon(t.coords, { color:border, fillColor:fill, fillOpacity:0.45, weight:2.5, opacity:0.9 });
      const label   = makeLabel(t.coords, fill, t.num);
      polygon.on('click',     () => openPopup(polygon, t.num, t.grupo));
      polygon.on('mouseover', () => polygon.setStyle({ fillOpacity:0.65, weight:3 }));
      polygon.on('mouseout',  () => polygon.setStyle({ fillOpacity:0.45, weight:2.5 }));
      allLayers.push({ polygon, label, group:t.grupo, numero:t.num });
      polygon.addTo(map); label.addTo(map);
      return;
    }

    // MODO PICKER
    if (_modoParam === 'picker') {
      const isMainGroup = (t.grupo === _grupoParam);
      // Color por días para el grupo principal, gris para los demás
      let c;
      if (isMainGroup) {
        const info = territoriosInfo[baseNum(t.num)] || {};
        const lastDate = info.lastFin || info.lastIni;
        c = colorByDias(lastDate ? daysSince(lastDate) : null);
      } else {
        c = { fill:'#555', border:'#444' };
      }
      const fillOp = isMainGroup ? 0.40 : 0.08;
      const weight = isMainGroup ? 2 : 1;
      const opacity = isMainGroup ? 0.9 : 0.35;
      const polygon = L.polygon(t.coords, { color:c.border, fillColor:c.fill, fillOpacity:fillOp, weight, opacity });
      const label   = makeLabel(t.coords, isMainGroup ? c.fill : '#444', t.num);
      polygon.on('click', () => togglePickerTerritory(t.num, polygon, t.grupo, label, c, { fillOp, weight, opacity, isMainGroup }));
      polygon.on('mouseover', () => {
        if (!pickerSelected.has(t.num))
          polygon.setStyle({ fillOpacity: isMainGroup ? 0.60 : 0.15, weight: weight+0.5 });
      });
      polygon.on('mouseout', () => {
        if (!pickerSelected.has(t.num))
          polygon.setStyle({ fillOpacity: fillOp, weight });
      });
      allLayers.push({ polygon, label, group:t.grupo, numero:t.num, baseStyle:{ fillOp, weight, opacity, isMainGroup }, c });
      polygon.addTo(map); label.addTo(map);
      return;
    }

    // MODO INFO
    let c;
    if (_modoParam === 'info') {
      const info     = territoriosInfo[baseNum(t.num)] || {};
      const lastDate = info.lastFin || info.lastIni;
      c = colorByDias(lastDate ? daysSince(lastDate) : null);
    } else {
      c = GRUPO_COLORS[t.grupo] || { fill:'#888', border:'#555' };
    }
    const polygon = L.polygon(t.coords, { color:c.border, fillColor:c.fill, fillOpacity:0.22, weight:2, opacity:0.9 });
    const label   = makeLabel(t.coords, c.fill, t.num);
    polygon.on('click',     () => openPopup(polygon, t.num, t.grupo));
    polygon.on('mouseover', () => polygon.setStyle({ fillOpacity:0.45, weight:2.5 }));
    polygon.on('mouseout',  () => polygon.setStyle({ fillOpacity:0.22, weight:2 }));
    allLayers.push({ polygon, label, group:t.grupo, numero:t.num });
    polygon.addTo(map); label.addTo(map);
  });
}

// ── Lógica picker ──
function togglePickerTerritory(num, polygon, grupo, label, c, baseStyleOverride) {
  map.closePopup();
  if (pickerSelected.has(num)) {
    pickerSelected.delete(num);
    const layer = allLayers.find(l => l.numero === num);
    if (layer) {
      const { fillOp, weight, opacity, isMainGroup } = layer.baseStyle;
      polygon.setStyle({ fillColor: layer.c.fill, color: layer.c.border, fillOpacity: fillOp, weight, opacity });
    }
    showToast(`Territorio ${num} quitado`, true);
  } else {
    pickerSelected.add(num);
    polygon.setStyle({ fillColor:'#97C459', color:'#3B6D11', fillOpacity:0.70, weight:3, opacity:1 });
    showToast(`Territorio ${num} agregado ✓`);
  }
  updatePickerBar();
}

function updatePickerBar() {
  const count = pickerSelected.size;
  const info = document.getElementById('picker-info');
  const clearBtn = document.getElementById('picker-clear');
  if (count === 0) {
    info.innerHTML = 'Tocá un territorio para seleccionarlo';
    clearBtn.style.display = 'none';
  } else {
    const nums = [...pickerSelected].join(', ');
    info.innerHTML = `<strong>${count}</strong> seleccionado${count>1?'s':''}: <strong>${nums}</strong>`;
    clearBtn.style.display = '';
  }
}

function clearPickerSelection() {
  pickerSelected.forEach(num => {
    const layer = allLayers.find(l => l.numero === num);
    if (layer) {
      const { fillOp, weight, opacity } = layer.baseStyle;
      layer.polygon.setStyle({ fillColor: layer.c.fill, color: layer.c.border, fillOpacity: fillOp, weight, opacity });
    }
  });
  pickerSelected.clear();
  updatePickerBar();
}

function confirmPickerSelection() {
  const territorios = [...pickerSelected];
  // Comunicar al padre (iframe o ventana)
  const msg = { type: 'picker-result', salidaId: _salidaId, territorios };
  if (window.parent && window.parent !== window) {
    window.parent.postMessage(msg, '*');
  } else if (window.opener) {
    window.opener.postMessage(msg, '*');
  }
}

// ── Aplicar filtro visual en modo picker ──
function applyPickerFilter(grupo) {
  if (allLayers.length === 0) return;
  const visible = allLayers.filter(l => l.group === grupo);
  if (visible.length) {
    const bounds = L.latLngBounds(visible.map(l => l.polygon.getBounds()));
    map.flyToBounds(bounds, { padding:[24,24], maxZoom:16, minZoom:16, duration:0.4 });
  } else if (allLayers.length) {
    const bounds = L.latLngBounds(allLayers.map(l => l.polygon.getBounds()));
    map.fitBounds(bounds, { padding:[20,20] });
  }
}

// ── Toast ──
let toastTimer = null;
function showToast(msg, isRemove = false) {
  const toast = document.getElementById('map-toast');
  toast.textContent = msg;
  toast.className = 'map-toast' + (isRemove ? ' remove-toast' : '');
  void toast.offsetWidth;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Popup normal (modos no-picker) ──
function openPopup(layer, numero, grupo) {
  const c = GRUPO_COLORS[grupo] || { fill:'#888' };
  const info = territoriosInfo[baseNum(numero)] || {};
  const lastDate = info.lastFin || info.lastIni;
  const dias = lastDate ? daysSince(lastDate) : null;
  let diasHtml = '<span style="color:#888;">—</span>';
  if (dias !== null) {
    const col = dias > 90 ? '#F09595' : dias > 45 ? '#FAC775' : '#C0DD97';
    diasHtml = `<span style="color:${col};font-weight:600;">${dias}d atrás</span>`;
  }
  const badge = info.enProgreso ? '<div class="badge-progreso">En progreso</div>' : '';
  const html = `
    <div>
      <div class="terr-popup-num" style="color:${c.fill};">${numero}</div>
      <div class="terr-popup-group" style="color:${c.fill};">${GRUPO_LABEL[grupo] || ''}</div>
      <div class="terr-popup-row"><span class="terr-popup-label">Último uso</span><span class="terr-popup-val">${lastDate ? fmtDate(lastDate) : '—'}</span></div>
      <div class="terr-popup-row"><span class="terr-popup-label">Hace</span><span class="terr-popup-val">${diasHtml}</span></div>
      ${badge}
    </div>`;
  const center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
  L.popup({ maxWidth: 240, closeButton: true }).setLatLng(center).setContent(html).openOn(map);
}

// ── handleBack ──
function handleBack() {
  if (_modoParam === 'picker') {
    // Cancelar sin enviar nada
    const msg = { type: 'picker-cancel', salidaId: _salidaId };
    if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*');
    else if (window.opener) window.opener.postMessage(msg, '*');
  } else {
    history.back();
  }
}

// ── Filtros (modo full) ──
function filterGroup(group) {
  activeFilter = group;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','inactive'));
  if (group === 'all') {
    document.getElementById('filter-all').classList.add('active');
    allLayers.forEach(({ polygon, label }) => {
      if (!map.hasLayer(polygon)) polygon.addTo(map);
      if (!map.hasLayer(label))   label.addTo(map);
      polygon.setStyle({ fillOpacity: 0.22, weight: 2 });
    });
  } else {
    document.getElementById('filter-' + group)?.classList.add('active');
    const visible = [], hidden = [];
    allLayers.forEach(l => (l.group === group ? visible : hidden).push(l));
    hidden.forEach(({ polygon, label }) => {
      if (map.hasLayer(polygon)) map.removeLayer(polygon);
      if (map.hasLayer(label))   map.removeLayer(label);
    });
    visible.forEach(({ polygon, label }) => {
      if (!map.hasLayer(polygon)) polygon.addTo(map);
      if (!map.hasLayer(label))   label.addTo(map);
      polygon.setStyle({ fillOpacity: 0.35, weight: 2.5 });
    });
    if (visible.length) {
      const bounds = L.latLngBounds(visible.map(l => l.polygon.getBounds()));
      map.flyToBounds(bounds, { padding:[30,30], maxZoom:16, duration:0.5 });
    }
  }
  map.closePopup();
}

// ── Utilidades ──
function fmtDate(ds) {
  if (!ds) return '—';
  let d;
  if (ds.includes('-')) d = new Date(ds + 'T00:00:00');
  else if (ds.includes('/')) {
    const p = ds.split('/');
    const y = p[2]?.length === 2 ? '20'+p[2] : p[2];
    d = new Date(`${y}-${p[1]}-${p[0]}T00:00:00`);
  }
  if (!d || isNaN(d)) return ds;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
}
function daysSince(ds) {
  if (!ds) return null;
  let d;
  if (ds.includes('-')) d = new Date(ds + 'T00:00:00');
  else if (ds.includes('/')) {
    const p = ds.split('/');
    const y = p[2]?.length === 2 ? '20'+p[2] : p[2];
    d = new Date(`${y}-${p[1]}-${p[0]}T00:00:00`);
  }
  if (!d || isNaN(d)) return null;
  return Math.floor((new Date() - d) / 86400000);
}
function colorByDias(dias) {
  if (dias === null)  return { fill: '#555', border: '#444' };
  if (dias <= 30)     return { fill: '#4CAF50', border: '#2E7D32' };
  if (dias <= 45)     return { fill: '#8BC34A', border: '#558B2F' };
  if (dias <= 60)     return { fill: '#FFC107', border: '#F57F17' };
  if (dias <= 90)     return { fill: '#FF9800', border: '#E65100' };
  if (dias <= 120)    return { fill: '#FF5722', border: '#BF360C' };
  return               { fill: '#F44336', border: '#B71C1C' };
}
