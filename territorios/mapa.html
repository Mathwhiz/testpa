<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa de Territorios</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
  #map { width: 100%; height: 100%; }

  .map-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 10px;
    background: rgba(18,18,18,0.92); backdrop-filter: blur(8px);
    padding: 10px 14px; border-bottom: 0.5px solid #333;
  }
  .map-back-btn {
    background: #2a2a2a; border: 0.5px solid #444; color: #eee;
    border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  .map-title { font-size: 14px; color: #ccc; font-weight: 500; flex: 1; }

  .map-filters {
    position: fixed; top: 47px; left: 0; right: 0; z-index: 999;
    display: flex; gap: 6px; padding: 8px 12px;
    background: rgba(18,18,18,0.85); backdrop-filter: blur(6px);
    border-bottom: 0.5px solid #333; overflow-x: auto; scrollbar-width: none;
  }
  .map-filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: #2a2a2a; border: 0.5px solid #444; color: #888;
    border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .filter-btn.active { border-width: 1.5px; color: #eee; background: #333; }

  /* Picker bar */
  .picker-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
    background: rgba(20,20,30,0.96); backdrop-filter: blur(8px);
    border-top: 0.5px solid #4A44A5; padding: 12px 14px;
    display: none; align-items: center; gap: 10px;
  }
  .picker-bar.visible { display: flex; }
  #picker-info { flex: 1; font-size: 13px; color: #aaa; line-height: 1.4; }
  #picker-info strong { color: #eee; }
  #picker-clear { background: #2e1a1a; color: #F09595; border: 0.5px solid #A32D2D; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  #picker-confirm { background: #1a2e0a; color: #97C459; border: 0.5px solid #3B6D11; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

  .map-toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(40,40,40,0.95); color: #eee; border-radius: 10px;
    padding: 8px 16px; font-size: 13px; z-index: 1002;
    opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none;
    white-space: nowrap;
  }
  .map-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .map-toast.remove-toast { background: rgba(46,26,26,0.95); color: #F09595; }

  .map-legend {
    position: fixed; bottom: 70px; left: 10px; z-index: 999;
    background: rgba(18,18,18,0.88); border: 0.5px solid #333;
    border-radius: 10px; padding: 8px 10px; font-size: 11px; color: #bbb;
  }
  .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Popup */
  .terr-popup-num { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .terr-popup-group { font-size: 12px; font-weight: 500; margin-bottom: 8px; opacity: 0.8; }
  .terr-popup-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 4px; font-size: 12px; }
  .terr-popup-label { color: #888; }
  .terr-popup-val { color: #eee; font-weight: 500; }
  .badge-progreso { margin-top: 8px; background: rgba(239,159,39,0.2); color: #EF9F27; border: 0.5px solid #EF9F27; border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 600; text-align: center; }

  /* Zoom control — esquina inferior derecha, estilo oscuro */
  .leaflet-control-zoom {
    margin-bottom: 14px !important;
    margin-right: 10px !important;
    border: none !important;
  }
  .leaflet-control-zoom a {
    background: rgba(30,30,30,0.92) !important;
    color: #ccc !important;
    border: 0.5px solid #444 !important;
    width: 40px !important;
    height: 40px !important;
    line-height: 40px !important;
    font-size: 20px !important;
  }
  .leaflet-control-zoom a:hover {
    background: rgba(50,50,50,0.95) !important;
    color: #eee !important;
  }

  /* Loading overlay */
  #map-loading {
    position: fixed; inset: 0; z-index: 2000;
    background: #1a1a1a; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    color: #888; font-size: 14px;
  }
  .loading-spinner {
    width: 36px; height: 36px; border: 3px solid #333;
    border-top-color: #7F77DD; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #map-loading.hidden { display: none; }
</style>
</head>
<body>

<div id="map-loading">
  <div class="loading-spinner"></div>
  <span id="loading-text">Cargando territorios...</span>
</div>

<div id="map"></div>

<div class="map-header">
  <button class="map-back-btn" onclick="handleBack()">← Volver</button>
  <div class="map-title" id="map-title">Territorios</div>
</div>

<div class="map-filters" id="map-filters-bar">
  <button class="filter-btn active" id="filter-all"   onclick="filterGroup('all')">Todos</button>
  <button class="filter-btn" id="filter-1" onclick="filterGroup('1')" style="border-color:#378ADD;color:#378ADD;">Grupo 1</button>
  <button class="filter-btn" id="filter-2" onclick="filterGroup('2')" style="border-color:#EF9F27;color:#EF9F27;">Grupo 2</button>
  <button class="filter-btn" id="filter-3" onclick="filterGroup('3')" style="border-color:#97C459;color:#97C459;">Grupo 3</button>
  <button class="filter-btn" id="filter-4" onclick="filterGroup('4')" style="border-color:#D85A30;color:#D85A30;">Grupo 4</button>
  <button class="filter-btn" id="filter-C" onclick="filterGroup('C')" style="border-color:#7F77DD;color:#7F77DD;">Congregación</button>
</div>

<div class="picker-bar" id="picker-bar">
  <div id="picker-info">Tocá un territorio para seleccionarlo</div>
  <button id="picker-clear" style="display:none;" onclick="clearPickerSelection()">✕ Limpiar</button>
  <button id="picker-confirm" onclick="confirmPickerSelection()">Confirmar ✓</button>
</div>

<div class="map-toast" id="map-toast"></div>
<div class="map-legend" id="map-legend">
  <div class="legend-row"><div class="legend-dot" style="background:#378ADD;"></div>Grupo 1</div>
  <div class="legend-row"><div class="legend-dot" style="background:#EF9F27;"></div>Grupo 2</div>
  <div class="legend-row"><div class="legend-dot" style="background:#97C459;"></div>Grupo 3</div>
  <div class="legend-row"><div class="legend-dot" style="background:#D85A30;"></div>Grupo 4</div>
  <div class="legend-row"><div class="legend-dot" style="background:#7F77DD;"></div>Congregación</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase SDK -->
<script type="module">
import { db } from '../firebase.js';
import {
  collection, getDocs, query, where, orderBy, limit
} from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const CONGRE_ID = sessionStorage.getItem('congreId') || 'sur';

const GRUPO_COLORS = {
  '1': { fill:'#378ADD', border:'#1A5FA5' },
  '2': { fill:'#EF9F27', border:'#A86800' },
  '3': { fill:'#97C459', border:'#3B6D11' },
  '4': { fill:'#D85A30', border:'#8B2E0A' },
  'C': { fill:'#7F77DD', border:'#4A44A5' },
};

const GRUPO_LABEL = { '1':'Grupo 1','2':'Grupo 2','3':'Grupo 3','4':'Grupo 4','C':'Congregación' };

// Territorios cargados desde Firestore — formato: [{num, grupo, coords, punto, tipo}]
let TERRITORIOS = [];

let map;
let allLayers = [];
let territoriosInfo = {};  // { [id]: { lastFin, lastIni, enProgreso } }
let activeFilter = 'all';
let pickerSelected = new Set();

const _params     = new URLSearchParams(window.location.search);
const _grupoParam = _params.get('grupo') || 'all';
const _modoParam  = _params.get('modo')  || 'full';
const _enProgreso = (_params.get('enprogreso') || '').split(',').filter(Boolean);
const _salidaId   = _params.get('salidaid') || null;

// ── Cargar datos desde Firestore ──
async function cargarTerritorios() {
  const terrCol = collection(db, 'congregaciones', CONGRE_ID, 'territorios');
  const snap = await getDocs(terrCol);

  TERRITORIOS = snap.docs.flatMap(d => {
    const t = d.data();
    const poligonos = t.poligonos || [];
    // Estructura real en Firestore: poligonos[i].coords[j] = {lat, lng}
    function normCoords(poly) {
      const arr = poly.coords || poly; // soporta {coords:[]} y [[lat,lng]]
      return (Array.isArray(arr) ? arr : []).map(v =>
        Array.isArray(v) ? [v[0], v[1]] : [v.lat, v.lng]
      );
    }
    // punto puede ser {lat,lng} o [lat,lng]
    function normPunto(p) {
      if (!p) return null;
      return Array.isArray(p) ? p : [p.lat, p.lng];
    }
    return poligonos.map((poly, idx) => ({
      num:    String(t.id) + (poligonos.length > 1 ? String.fromCharCode(65 + idx) : ''),
      grupo:  String(t.grupoId),
      coords: normCoords(poly),
      punto:  normPunto(t.punto),
      tipo:   t.tipo || 'normal',
    })).filter(entry => entry.coords.length >= 3);
  });
}

async function cargarHistorialInfo() {
  // Para el modo info/picker necesitamos el último uso de cada territorio
  // Cargamos con getDocs sobre la subcolección historial de cada territorio
  // Para no hacer N queries, usamos collectionGroup si está disponible,
  // pero como fallback hacemos queries por grupo solicitado.
  try {
    const gruposACargar = _grupoParam !== 'all' ? [_grupoParam] : ['1','2','3','4','C'];
    const terrCol = collection(db, 'congregaciones', CONGRE_ID, 'territorios');

    for (const g of gruposACargar) {
      const q = query(terrCol, where('grupoId', '==', g));
      const terrSnap = await getDocs(q);
      await Promise.all(terrSnap.docs.map(async terrDoc => {
        const id = String(terrDoc.data().id);
        const histSnap = await getDocs(
          query(
            collection(db, 'congregaciones', CONGRE_ID, 'territorios', terrDoc.id, 'historial'),
            orderBy('fechaInicio', 'desc'),
            limit(1)
          )
        );
        if (!histSnap.empty) {
          const h = histSnap.docs[0].data();
          territoriosInfo[id] = {
            lastFin:    h.fechaFin    || null,
            lastIni:    h.fechaInicio || null,
            enProgreso: !!h.fechaInicio && !h.fechaFin,
          };
        }
      }));
    }
  } catch(e) {
    console.warn('Error cargando historial:', e);
  }
}

// ── Init ──
async function initMap() {
  try {
    document.getElementById('loading-text').textContent = 'Cargando territorios...';
    await cargarTerritorios();

    // En info/picker el historial es necesario antes de renderizar (colorea polígonos)
    if (_modoParam === 'info' || _modoParam === 'picker') {
      document.getElementById('loading-text').textContent = 'Cargando historial...';
      await cargarHistorialInfo();
    }
  } catch(err) {
    document.getElementById('loading-text').textContent = 'Error al cargar: ' + err.message;
    return;
  }

  document.getElementById('map-loading').classList.add('hidden');

  // Ocultar header y filtros si viene embebido
  if (_modoParam !== 'full' && _modoParam !== 'picker') {
    document.querySelector('.map-header').style.display = 'none';
    document.querySelector('.map-filters').style.display = 'none';
  }
  if (_modoParam === 'picker' || _params.get('picker') === '1') {
    document.getElementById('picker-bar').classList.add('visible');
    document.querySelector('.map-filters').style.display = 'none';
    document.querySelector('.map-header').style.display = 'none';
    updatePickerBar();
  }

  map = L.map('map', {
    center: [-36.62, -64.29],
    zoom: 13,
    zoomControl: false,
    attributionControl: false,
    maxBounds: [[-36.85, -64.75], [-36.40, -63.95]],
    maxBoundsViscosity: 1.0,
    minZoom: 11,
  });
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  setTimeout(() => { map.invalidateSize(); }, 100);

  renderTerritories();

  // En modo full cargamos el historial en background (el mapa ya está visible)
  if (_modoParam === 'full') {
    cargarHistorialInfo().catch(e => console.warn('Historial:', e));
  }

  if (_modoParam === 'picker' || _params.get('picker') === '1') {
    applyPickerFilter(_grupoParam);
  } else if (_grupoParam !== 'all') {
    filterGroup(_grupoParam);
  } else if (allLayers.length) {
    const validLayers = allLayers.filter(l => l.polygon.getBounds().isValid());
    if (validLayers.length) {
      const b = validLayers[0].polygon.getBounds();
      validLayers.slice(1).forEach(l => b.extend(l.polygon.getBounds()));
      map.fitBounds(b, { padding: [20, 20] });
    }
  }

  // Leyenda según modo
  const legend = document.getElementById('map-legend');
  if (_modoParam === 'registrar') {
    legend.innerHTML = `<div class="legend-row"><div class="legend-dot" style="background:#EF9F27;"></div>En progreso</div>`;
  } else if (_modoParam === 'info' || _modoParam === 'picker') {
    legend.innerHTML = `
      <div class="legend-row"><div class="legend-dot" style="background:#4CAF50;"></div>≤ 30 días</div>
      <div class="legend-row"><div class="legend-dot" style="background:#8BC34A;"></div>31–45 días</div>
      <div class="legend-row"><div class="legend-dot" style="background:#FFC107;"></div>46–60 días</div>
      <div class="legend-row"><div class="legend-dot" style="background:#FF9800;"></div>61–90 días</div>
      <div class="legend-row"><div class="legend-dot" style="background:#FF5722;"></div>91–120 días</div>
      <div class="legend-row"><div class="legend-dot" style="background:#F44336;"></div>&gt; 120 días</div>
      <div class="legend-row"><div class="legend-dot" style="background:#555;"></div>Sin registro</div>
      ${_modoParam === 'picker' ? '<div class="legend-row"><div class="legend-dot" style="background:#97C459;border:1.5px solid #3B6D11;"></div>Seleccionado</div>' : ''}`;
  }
}

function baseNum(num) {
  return String(num).replace(/[A-Ca-c]$/i, '');
}

function makeLabel(coords, fill, text) {
  // Guard: coords debe ser array de al menos 3 puntos válidos
  const valid = coords.filter(v => Array.isArray(v) && v.length >= 2 && isFinite(v[0]) && isFinite(v[1]));
  if (valid.length < 3) return L.marker([0,0], { opacity: 0, interactive: false, icon: L.divIcon({ html: '' }) });

  let labelCenter;
  const n = valid.length;
  let A = 0, cLat = 0, cLon = 0;
  for (let i = 0; i < n; i++) {
    const [la0, lo0] = valid[i];
    const [la1, lo1] = valid[(i + 1) % n];
    const cr = lo0 * la1 - lo1 * la0;
    A += cr; cLat += (la0 + la1) * cr; cLon += (lo0 + lo1) * cr;
  }
  A *= 0.5;
  if (Math.abs(A) > 1e-10) {
    labelCenter = L.latLng(cLat / (6 * A), cLon / (6 * A));
  } else {
    // Fallback: promedio simple de todos los vértices
    const avgLat = valid.reduce((s, v) => s + v[0], 0) / n;
    const avgLng = valid.reduce((s, v) => s + v[1], 0) / n;
    labelCenter = L.latLng(avgLat, avgLng);
  }

  const w = Math.max(26, text.length*7+10);
  return L.marker(labelCenter, {
    interactive: false,
    icon: L.divIcon({
      className: '',
      html: `<div style="background:rgba(18,18,18,0.9);border:1.5px solid ${fill};color:${fill};border-radius:6px;padding:2px 5px;font-size:10px;font-weight:700;font-family:system-ui,sans-serif;white-space:nowrap;pointer-events:none;text-align:center;">${text}</div>`,
      iconSize: [w,18], iconAnchor: [w/2,9],
    })
  });
}

function renderTerritories() {
  TERRITORIOS.forEach(t => {
    if (!t.coords || t.coords.length < 3) return; // skip polígonos inválidos

    if (_modoParam === 'registrar') {
      if (!_enProgreso.includes(baseNum(t.num))) return;
      const fill = '#EF9F27', border = '#A86800';
      const polygon = L.polygon(t.coords, { color:border, fillColor:fill, fillOpacity:0.45, weight:2.5, opacity:0.9 });
      const label   = makeLabel(t.coords, fill, t.num);
      polygon.on('click',     () => openPopup(polygon, t.num, t.grupo));
      polygon.on('mouseover', () => polygon.setStyle({ fillOpacity:0.65, weight:3 }));
      polygon.on('mouseout',  () => polygon.setStyle({ fillOpacity:0.45, weight:2.5 }));
      allLayers.push({ polygon, label, group:t.grupo, numero:t.num });
      polygon.addTo(map); label.addTo(map);
      return;
    }

    if (_modoParam === 'picker' || _params.get('picker') === '1') {
      const isMainGroup = String(t.grupo) === String(_grupoParam);
      if (!isMainGroup) return;

      const info = territoriosInfo[baseNum(t.num)] || {};
      const lastDate = info.lastFin || info.lastIni;
      const c = colorByDias(lastDate ? daysSince(lastDate) : null);
      const fillOp = 0.22;
      const weight = 2;
      const opacity = 0.9;

      const polygon = L.polygon(t.coords, { color:c.border, fillColor:c.fill, fillOpacity:fillOp, weight, opacity });
      const label   = makeLabel(t.coords, c.fill, t.num);
      polygon.on('click', () => togglePickerTerritory(t.num, polygon, t.grupo, label, c, { fillOp, weight, opacity, isMainGroup }));
      polygon.on('mouseover', () => {
        if (!pickerSelected.has(t.num))
          polygon.setStyle({ fillOpacity: 0.45, weight: 2.5 });
      });
      polygon.on('mouseout', () => {
        if (!pickerSelected.has(t.num))
          polygon.setStyle({ fillOpacity: fillOp, weight });
      });
      allLayers.push({ polygon, label, group:t.grupo, numero:t.num, baseStyle:{ fillOp, weight, opacity, isMainGroup }, c });
      polygon.addTo(map); label.addTo(map);
      return;
    }

    // MODO FULL e INFO
    let c;
    if (_modoParam === 'info' || _modoParam === 'picker') {
      const info     = territoriosInfo[baseNum(t.num)] || {};
      const lastDate = info.lastFin || info.lastIni;
      c = colorByDias(lastDate ? daysSince(lastDate) : null);
    } else {
      c = GRUPO_COLORS[t.grupo] || { fill:'#888', border:'#555' };
    }
    const polygon = L.polygon(t.coords, { color:c.border, fillColor:c.fill, fillOpacity:0.22, weight:2, opacity:0.9 });
    const label   = makeLabel(t.coords, c.fill, t.num);
    polygon.on('click',     () => openPopup(polygon, t.num, t.grupo));
    polygon.on('mouseover', () => polygon.setStyle({ fillOpacity:0.45, weight:2.5 }));
    polygon.on('mouseout',  () => polygon.setStyle({ fillOpacity:0.22, weight:2 }));
    allLayers.push({ polygon, label, group:t.grupo, numero:t.num });
    polygon.addTo(map); label.addTo(map);
  });
}

// ── Picker ──
function togglePickerTerritory(num, polygon, grupo, label, c, baseStyleOverride) {
  map.closePopup();
  if (pickerSelected.has(num)) {
    pickerSelected.delete(num);
    const layer = allLayers.find(l => l.numero === num);
    if (layer) {
      const { fillOp, weight, opacity } = layer.baseStyle;
      polygon.setStyle({ fillColor: layer.c.fill, color: layer.c.border, fillOpacity: fillOp, weight, opacity });
    }
    showToast(`Territorio ${num} quitado`, true);
  } else {
    pickerSelected.add(num);
    polygon.setStyle({ fillColor:'#97C459', color:'#3B6D11', fillOpacity:0.70, weight:3, opacity:1 });
    showToast(`Territorio ${num} agregado ✓`);
  }
  updatePickerBar();
}

function updatePickerBar() {
  const count = pickerSelected.size;
  const info = document.getElementById('picker-info');
  const clearBtn = document.getElementById('picker-clear');
  if (count === 0) {
    info.innerHTML = 'Tocá un territorio para seleccionarlo';
    clearBtn.style.display = 'none';
  } else {
    const nums = [...pickerSelected].join(', ');
    info.innerHTML = `<strong>${count}</strong> seleccionado${count>1?'s':''}: <strong>${nums}</strong>`;
    clearBtn.style.display = '';
  }
}

function clearPickerSelection() {
  pickerSelected.forEach(num => {
    const layer = allLayers.find(l => l.numero === num);
    if (layer) {
      const { fillOp, weight, opacity } = layer.baseStyle;
      layer.polygon.setStyle({ fillColor: layer.c.fill, color: layer.c.border, fillOpacity: fillOp, weight, opacity });
    }
  });
  pickerSelected.clear();
  updatePickerBar();
}

function confirmPickerSelection() {
  const territorios = [...pickerSelected];
  const msg = { type: 'picker-result', salidaId: _salidaId, territorios };
  if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*');
  else if (window.opener) window.opener.postMessage(msg, '*');
}

function applyPickerFilter(grupo) {
  if (allLayers.length === 0) return;

  const validLayers = allLayers.filter(l =>
    String(l.group) === String(grupo) &&
    l.polygon.getBounds().isValid()
  );

  if (validLayers.length) {
    const b = validLayers[0].polygon.getBounds();
    validLayers.slice(1).forEach(l => b.extend(l.polygon.getBounds()));
    map.flyToBounds(b, { padding:[24,24], maxZoom:16, duration:0.4 });
  }
}

// ── Toast ──
let toastTimer = null;
function showToast(msg, isRemove = false) {
  const toast = document.getElementById('map-toast');
  toast.textContent = msg;
  toast.className = 'map-toast' + (isRemove ? ' remove-toast' : '');
  void toast.offsetWidth;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Popup normal ──
function openPopup(layer, numero, grupo) {
  const c = GRUPO_COLORS[grupo] || { fill:'#888' };
  const info = territoriosInfo[baseNum(numero)] || {};
  const lastDate = info.lastFin || info.lastIni;
  const dias = lastDate ? daysSince(lastDate) : null;
  let diasHtml = '<span style="color:#888;">—</span>';
  if (dias !== null) {
    const col = dias > 90 ? '#F09595' : dias > 45 ? '#FAC775' : '#C0DD97';
    diasHtml = `<span style="color:${col};font-weight:600;">${dias}d atrás</span>`;
  }
  const badge = info.enProgreso ? '<div class="badge-progreso">En progreso</div>' : '';
  const html = `
    <div>
      <div class="terr-popup-num" style="color:${c.fill};">${numero}</div>
      <div class="terr-popup-group" style="color:${c.fill};">${GRUPO_LABEL[grupo] || ''}</div>
      <div class="terr-popup-row"><span class="terr-popup-label">Último uso</span><span class="terr-popup-val">${lastDate ? fmtDate(lastDate) : '—'}</span></div>
      <div class="terr-popup-row"><span class="terr-popup-label">Hace</span><span class="terr-popup-val">${diasHtml}</span></div>
      ${badge}
    </div>`;
  const center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
  L.popup({ maxWidth: 240, closeButton: true }).setLatLng(center).setContent(html).openOn(map);
}

// ── handleBack ──
window.handleBack = function() {
  if (_modoParam === 'picker' || _params.get('picker') === '1') {
    const msg = { type: 'picker-cancel', salidaId: _salidaId };
    if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*');
    else if (window.opener) window.opener.postMessage(msg, '*');
  } else {
    history.back();
  }
};

// ── Filtros (modo full) ──
window.filterGroup = function(group) {
  activeFilter = group;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('filter-' + group);
  if (activeBtn) activeBtn.classList.add('active');

  if (group === 'all') {
    allLayers.forEach(({ polygon, label }) => {
      if (!map.hasLayer(polygon)) polygon.addTo(map);
      if (!map.hasLayer(label))   label.addTo(map);
      polygon.setStyle({ fillOpacity: 0.22, weight: 2 });
    });
  } else {
    const visible = [], hidden = [];
    allLayers.forEach(l => (l.group === group ? visible : hidden).push(l));
    hidden.forEach(({ polygon, label }) => {
      if (map.hasLayer(polygon)) map.removeLayer(polygon);
      if (map.hasLayer(label))   map.removeLayer(label);
    });
    visible.forEach(({ polygon, label }) => {
      if (!map.hasLayer(polygon)) polygon.addTo(map);
      if (!map.hasLayer(label))   label.addTo(map);
      polygon.setStyle({ fillOpacity: 0.35, weight: 2.5 });
    });
    if (visible.length) {
      const validLayers = visible.filter(l => l.polygon.getBounds().isValid());
      if (validLayers.length) {
        const b = validLayers[0].polygon.getBounds();
        validLayers.slice(1).forEach(l => b.extend(l.polygon.getBounds()));
        map.flyToBounds(b, { padding:[30,30], maxZoom:16, duration:0.5 });
      }
    }
  }
  map.closePopup();
};

// ── Utilidades ──
function fmtDate(ds) {
  if (!ds) return '—';
  const d = new Date(ds + 'T00:00:00');
  if (isNaN(d)) return ds;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
}
function daysSince(ds) {
  if (!ds) return null;
  const d = new Date(ds + 'T00:00:00');
  if (isNaN(d)) return null;
  return Math.floor((new Date() - d) / 86400000);
}
function colorByDias(dias) {
  if (dias === null)  return { fill: '#555', border: '#444' };
  if (dias <= 30)     return { fill: '#4CAF50', border: '#2E7D32' };
  if (dias <= 45)     return { fill: '#8BC34A', border: '#558B2F' };
  if (dias <= 60)     return { fill: '#FFC107', border: '#F57F17' };
  if (dias <= 90)     return { fill: '#FF9800', border: '#E65100' };
  if (dias <= 120)    return { fill: '#FF5722', border: '#BF360C' };
  return               { fill: '#F44336', border: '#B71C1C' };
}

// Exponer funciones de picker al scope global
window.clearPickerSelection = clearPickerSelection;
window.confirmPickerSelection = confirmPickerSelection;

// Arrancar
initMap();
