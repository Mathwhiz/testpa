<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programa Vida y Ministerio</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1c1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ziv">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="styles.css?v=3.0">
  <style>
    .prog-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0 8px;
    }
    .prog-titulo-wrap { flex: 1; min-width: 0; }
    .prog-titulo { font-size: 17px; font-weight: 600; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prog-sub    { font-size: 12px; color: #555; margin-top: 1px; }
    .prog-nav-btn {
      background: #232628;
      border: 0.5px solid #3a3a3a;
      color: #aaa;
      border-radius: 8px;
      width: 36px; height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .prog-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .prog-share-btn {
      background: #232628;
      border: 0.5px solid #3a3a3a;
      color: #aaa;
      border-radius: 8px;
      height: 36px;
      padding: 0 12px;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      flex-shrink: 0;
    }
    .prog-share-btn:active { background: #2a2a2a; }
    .prog-congre { font-size: 13px; color: #555; margin-bottom: 12px; }
    .prog-error  { color: #F09595; font-size: 14px; padding: 20px 0; text-align: center; }
  </style>
</head>
<body>

<div class="app-inner">
  <div class="prog-header">
    <button class="prog-nav-btn" id="btn-prev" onclick="navSemana(-1)" title="Semana anterior">‹</button>
    <div class="prog-titulo-wrap">
      <div class="prog-titulo" id="prog-titulo">Cargando…</div>
      <div class="prog-sub">Vida y Ministerio</div>
    </div>
    <button class="prog-nav-btn" id="btn-next" onclick="navSemana(1)" title="Semana siguiente">›</button>
    <button class="prog-share-btn" onclick="compartir()" title="Compartir enlace">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      Compartir
    </button>
  </div>

  <div id="prog-congre" class="prog-congre"></div>
  <div id="prog-contenido">
    <div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Cargando…</div></div>
  </div>
  <div style="height:2rem;"></div>
</div>

<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');</script>
<script type="module" src="programa.js"></script>
</body>
</html>
