<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Territory App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    :root {
      --bg: oklch(0.145 0 0);
      --surface: oklch(0.145 0 0);
      --border: oklch(0.269 0 0);
      --border-hover: oklch(0.34 0 0);
      --text: oklch(0.985 0 0);
      --muted: oklch(0.708 0 0);
      --subtle: oklch(0.439 0 0);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: 'oklch(0.145 0 0)',
            surface: 'oklch(0.145 0 0)',
            border: 'oklch(0.269 0 0)',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:var(--bg);color:var(--text);">

  <!-- ── Screen 1: Congregation Selector ── -->
  <div id="screen-1" class="w-full max-w-[360px] flex flex-col items-center gap-3">

    <!-- Logo -->
    <div class="mb-4 flex flex-col items-center gap-3">
      <svg width="64" height="64" viewBox="0 0 72 72" fill="none">
        <defs>
          <linearGradient id="hexGrad" x1="8" y1="4" x2="64" y2="68" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#9B8FFF"/>
            <stop offset="50%" stop-color="#7061E0"/>
            <stop offset="100%" stop-color="#4A3FB5"/>
          </linearGradient>
          <linearGradient id="iconGrad" x1="18" y1="18" x2="54" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#C4BEFF"/>
            <stop offset="100%" stop-color="#9B8FFF"/>
          </linearGradient>
        </defs>
        <path d="M36 4 L64 20 L64 52 L36 68 L8 52 L8 20 Z" fill="url(#hexGrad)"/>
        <path d="M36 9 L60 23 L60 49 L36 63 L12 49 L12 23 Z" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <circle cx="28" cy="27" r="6" fill="url(#iconGrad)"/>
        <path d="M16 48 C16 40 22 36 28 36 C31 36 33.5 37.2 35.5 39" stroke="url(#iconGrad)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
        <circle cx="40" cy="25" r="7" fill="url(#iconGrad)"/>
        <path d="M26 50 C27 41.5 33 37 40 37 C47 37 53 41.5 54 50" stroke="url(#iconGrad)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
      </svg>
      <div>
        <h1 class="text-2xl font-semibold tracking-tight text-center" style="color:var(--text);">Territory App</h1>
        <p class="text-sm text-center mt-0.5" style="color:var(--muted);">Seleccioná tu congregación</p>
      </div>
    </div>

    <!-- Congregation cards -->
    <button onclick="goToScreen2('Sur')" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-[10px] border text-left transition-colors duration-150 group"
      style="background:var(--surface);border-color:var(--border);"
      onmouseenter="this.style.borderColor='var(--border-hover)';this.style.background='oklch(0.19 0 0)'"
      onmouseleave="this.style.borderColor='var(--border)';this.style.background='var(--surface)'">
      <div class="w-9 h-9 rounded-[8px] flex items-center justify-center flex-shrink-0 text-base" style="background:oklch(0.205 0 0);border:1px solid var(--border);">🏠</div>
      <div class="flex-1">
        <div class="text-sm font-medium" style="color:var(--text);">Congregación Sur</div>
        <div class="text-xs font-mono mt-0.5" style="color:var(--subtle);">sur</div>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 flex-shrink-0" style="color:var(--subtle);stroke-width:1.5"></i>
    </button>

    <button onclick="goToScreen2('Norte')" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-[10px] border text-left transition-colors duration-150"
      style="background:var(--surface);border-color:var(--border);"
      onmouseenter="this.style.borderColor='var(--border-hover)';this.style.background='oklch(0.19 0 0)'"
      onmouseleave="this.style.borderColor='var(--border)';this.style.background='var(--surface)'">
      <div class="w-9 h-9 rounded-[8px] flex items-center justify-center flex-shrink-0 text-base" style="background:oklch(0.205 0 0);border:1px solid var(--border);">🏡</div>
      <div class="flex-1">
        <div class="text-sm font-medium" style="color:var(--text);">Congregación Norte</div>
        <div class="text-xs font-mono mt-0.5" style="color:var(--subtle);">norte</div>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 flex-shrink-0" style="color:var(--subtle);stroke-width:1.5"></i>
    </button>

    <p class="text-xs mt-2" style="color:oklch(0.32 0 0);">Territory App · Sistema interno</p>
  </div>

  <!-- ── Screen 2: Module Selector ── -->
  <div id="screen-2" class="w-full max-w-[360px] flex flex-col items-center gap-3 hidden">

    <!-- Back -->
    <button onclick="goToScreen1()" class="self-start flex items-center gap-1.5 text-sm mb-1 transition-colors duration-150"
      style="color:var(--subtle);"
      onmouseenter="this.style.color='var(--muted)'"
      onmouseleave="this.style.color='var(--subtle)'">
      <i data-lucide="arrow-left" class="w-4 h-4" style="stroke-width:1.5"></i>
      Volver
    </button>

    <!-- Logo -->
    <div class="mb-4 flex flex-col items-center gap-3">
      <svg width="64" height="64" viewBox="0 0 72 72" fill="none">
        <defs>
          <linearGradient id="hexGrad2" x1="8" y1="4" x2="64" y2="68" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#9B8FFF"/>
            <stop offset="50%" stop-color="#7061E0"/>
            <stop offset="100%" stop-color="#4A3FB5"/>
          </linearGradient>
          <linearGradient id="iconGrad2" x1="18" y1="18" x2="54" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#C4BEFF"/>
            <stop offset="100%" stop-color="#9B8FFF"/>
          </linearGradient>
        </defs>
        <path d="M36 4 L64 20 L64 52 L36 68 L8 52 L8 20 Z" fill="url(#hexGrad2)"/>
        <path d="M36 9 L60 23 L60 49 L36 63 L12 49 L12 23 Z" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <circle cx="28" cy="27" r="6" fill="url(#iconGrad2)"/>
        <path d="M16 48 C16 40 22 36 28 36 C31 36 33.5 37.2 35.5 39" stroke="url(#iconGrad2)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
        <circle cx="40" cy="25" r="7" fill="url(#iconGrad2)"/>
        <path d="M26 50 C27 41.5 33 37 40 37 C47 37 53 41.5 54 50" stroke="url(#iconGrad2)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
      </svg>
      <div>
        <h1 id="congre-name" class="text-2xl font-semibold tracking-tight text-center" style="color:var(--text);">Congregación Sur</h1>
        <p class="text-sm text-center mt-0.5" style="color:var(--muted);">Seleccioná un módulo</p>
      </div>
    </div>

    <!-- Territorios -->
    <button class="w-full flex items-center gap-3 px-4 py-3.5 rounded-[10px] border text-left transition-colors duration-150"
      style="background:var(--surface);border-color:var(--border);"
      onmouseenter="this.style.borderColor='oklch(0.32 0.04 145)';this.style.background='oklch(0.175 0.01 145)'"
      onmouseleave="this.style.borderColor='var(--border)';this.style.background='var(--surface)'">
      <div class="w-9 h-9 rounded-[8px] flex items-center justify-center flex-shrink-0" style="background:oklch(0.18 0.03 145);border:1px solid oklch(0.28 0.04 145);">
        <i data-lucide="map" class="w-4 h-4" style="color:oklch(0.65 0.15 145);stroke-width:1.5"></i>
      </div>
      <div class="flex-1">
        <div class="text-sm font-medium" style="color:var(--text);">Territorios</div>
        <div class="text-xs mt-0.5" style="color:var(--muted);">Planificar y registrar salidas</div>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 flex-shrink-0" style="color:var(--subtle);stroke-width:1.5"></i>
    </button>

    <!-- Asignaciones -->
    <button class="w-full flex items-center gap-3 px-4 py-3.5 rounded-[10px] border text-left transition-colors duration-150"
      style="background:var(--surface);border-color:var(--border);"
      onmouseenter="this.style.borderColor='oklch(0.32 0.04 240)';this.style.background='oklch(0.175 0.015 240)'"
      onmouseleave="this.style.borderColor='var(--border)';this.style.background='var(--surface)'">
      <div class="w-9 h-9 rounded-[8px] flex items-center justify-center flex-shrink-0" style="background:oklch(0.18 0.03 240);border:1px solid oklch(0.28 0.04 240);">
        <i data-lucide="users" class="w-4 h-4" style="color:oklch(0.65 0.13 240);stroke-width:1.5"></i>
      </div>
      <div class="flex-1">
        <div class="text-sm font-medium" style="color:var(--text);">Asignaciones</div>
        <div class="text-xs mt-0.5" style="color:var(--muted);">Acomodadores, sonido y más</div>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 flex-shrink-0" style="color:var(--subtle);stroke-width:1.5"></i>
    </button>

    <p class="text-xs mt-2" style="color:oklch(0.32 0 0);" id="congre-footer">Congregación Sur · App interna</p>
  </div>

  <script>
    lucide.createIcons();

    function goToScreen2(name) {
      document.getElementById('screen-1').classList.add('hidden');
      document.getElementById('screen-2').classList.remove('hidden');
      document.getElementById('congre-name').textContent = 'Congregación ' + name;
      document.getElementById('congre-footer').textContent = 'Congregación ' + name + ' · App interna';
      lucide.createIcons();
    }

    function goToScreen1() {
      document.getElementById('screen-2').classList.add('hidden');
      document.getElementById('screen-1').classList.remove('hidden');
    }
  </script>
</body>
</html>
